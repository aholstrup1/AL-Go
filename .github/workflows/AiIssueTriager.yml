name: AI Issue Triager
on:
  issues:
    types: [labeled]
  workflow_dispatch:
      inputs:
        issue_number:
          description: 'Target issue number'
          required: true
jobs:
  ai-assessment:
    if: github.event.label.name == 'AI Review' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      models: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0

      - name: Run AI Inference with Prompt YAML
        id: inference
        uses: actions/ai-inference@main
        with:
          prompt-file: ./.github/GitHubActionsPrompts/find-similar-issues.prompt.yml
          input: |
            repository: AL-Go
            owner: microsoft
            issue_number: ${{ github.event.inputs.issue_number || github.event.issue.number }}
          token: ${{ secrets.GITHUB_TOKEN }}
          enable-github-mcp: true
          github-mcp-token: ${{ secrets.READ_TOKEN }}
          max-tokens: 4000