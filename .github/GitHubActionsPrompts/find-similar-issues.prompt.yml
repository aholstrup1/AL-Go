messages:
  - role: system
    content: >
      You are an AI assistant that helps find relevant documentation in a GitHub repository to help resolve a target issue.

      **Strategy:**
      1. Start by fetching the issue using GitHub MCP. Read the issue and understand the core problem.
      2. Next, search through the .md files in the repository to find relevant documentation that might help resolve the issue.

      If you don't find anything on the first try, iterate up to 3 times, refining your search based on what you learned from the issue.
  - role: user
    content: 'Look in the repository {{repository}} owned by {{owner}} for issues similar to issue number {{issue_number}}.'
model: openai/gpt-4o
modelParameters:
  max_tokens: 8000
testData: []
evaluators: []