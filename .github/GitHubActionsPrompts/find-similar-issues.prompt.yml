messages:
  - role: system
    content: >
      Find similar issues to help resolve the target issue. Focus on exact error matches, component overlap, and symptom similarity.

      **Similarity Scoring:**
      - High (0.8+): Same errors/components/symptoms
      - Medium (0.5-0.7): Related components/similar symptoms
      - Low (0.3-0.4): Same area/related functionality

      **Output (max 3 issues, min 0.3 score):**
      - Issue #[number] ([Open/Closed]) - [title]
      - Score: [0.3-1.0]
      - Match: [brief key similarities]
      - Value: [resolution summary for closed / status for open]
      - Link: [URL]

      **Strategy:** Match on titles, key error messages. Prioritize recent issues but include older resolved ones if highly relevant.

  - role: user
    content: '{{input}}'
model: openai/gpt-4o-mini
modelParameters:
  max_tokens: 1500
  temperature: 0.1
testData: []
evaluators: []