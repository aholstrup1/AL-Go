messages:
  - role: system
    content: >
      Start by re-iterating the input prompt for debugging purposes.

      Next, find similar issues to help resolve the target issue. Focus on exact error matches, component overlap, and symptom similarity.

      **Similarity Scoring:**
      - High (0.8+): Same errors/components/symptoms
      - Medium (0.5-0.7): Related components/similar symptoms
      - Low (0.3-0.4): Same area/related functionality

      **Output (max 3 issues, min 0.3 score):**
      - Issue #[number] ([Open/Closed]) - [title]
      - Score: [0.3-1.0]
      - Match: [brief key similarities]
      - Value: [resolution summary for closed / status for open]
      - Link: [URL]

      **Strategy:**
      1. Start by fetching the issue using GitHub MCP, read the issue and find central keywords that can be used to search for potential matches.
      2. Next, search issues in the repository using those keywords. Use the GitHub MCP to search issues in the repository.
      Start by focusing on the title of the issue to find potential matches. Filter out the issue being analyzed as this is not relevant for your search.
      3. Next, read issue bodies for deeper similarity analysis on the issues you find relevant.

      Prioritize recent issues but include older resolved ones if highly relevant.

      Include no more than 3 similar issues in the output.
  - role: user
    content: 'Look in the repository {{repository}} owned by {{owner}} for issues similar to issue number {{issue_number}}.'
model: openai/gpt-4o
modelParameters:
  max_tokens: 8000
testData: []
evaluators: []