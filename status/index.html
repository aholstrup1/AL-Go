---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-Go Status Page</title>
    <style>
        :root {
            --bg: #ffffff;
            --card-bg: #f6f8fa;
            --card-border: #d0d7de;
            --text: #1f2328;
            --text-secondary: #656d76;
            --accent: #0969da;
            --green: #1a7f37;
            --red: #cf222e;
            --orange: #bf8700;
            --label-text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--card-border);
        }

        header h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .status-banner {
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-banner.all-clear {
            background: #dafbe1;
            color: var(--green);
            border: 1px solid #aceebb;
        }

        .status-banner.has-issues {
            background: #fff8c5;
            color: var(--orange);
            border: 1px solid #f5e0a0;
        }

        .issue-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .issue-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            transition: border-color 0.2s;
        }

        .issue-card:hover {
            border-color: var(--accent);
        }

        .issue-card h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .issue-card h3 a {
            color: var(--accent);
            text-decoration: none;
        }

        .issue-card h3 a:hover {
            text-decoration: underline;
        }

        .issue-meta {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
        }

        .issue-body {
            font-size: 0.95rem;
            color: var(--text);
            margin-bottom: 0.75rem;
            max-height: 100px;
            overflow: hidden;
            position: relative;
        }

        .issue-body::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(transparent, var(--card-bg));
        }

        .labels {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .label {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .error-msg {
            text-align: center;
            padding: 2rem;
            color: var(--red);
            background: #ffebe9;
            border: 1px solid #ffcecb;
            border-radius: 8px;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--card-border);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <nav style="display:flex;gap:1.5rem;justify-content:center;padding:1rem 0;margin-bottom:1rem;border-bottom:1px solid var(--card-border);font-size:0.95rem;">
            <a href="./" style="color:var(--accent);text-decoration:none;padding:0.25rem 0;border-bottom:2px solid var(--accent);font-weight:600;">🔔 Known Issues</a>
            <a href="./releases/" style="color:var(--text-secondary);text-decoration:none;padding:0.25rem 0;border-bottom:2px solid transparent;">📦 Releases</a>
        </nav>

        <header>
            <h1>🔔 AL-Go for GitHub — Known Issues</h1>
            <p>Current known issues and their status</p>
        </header>

        <div id="status-banner" class="status-banner" style="display:none;"></div>
        <div id="loading" class="loading">Loading issues...</div>
        <div id="error" class="error-msg" style="display:none;"></div>
        <div id="issue-list" class="issue-list"></div>

        <footer>
            <p>
                Powered by <a href="https://github.com/microsoft/AL-Go">AL-Go for GitHub</a> ·
                <a href="https://github.com/microsoft/AL-Go/issues">View all issues</a> ·
                Auto-updated from GitHub Issues
            </p>
        </footer>
    </div>

    <script>
        const SOURCES = [
            { owner: 'aholstrup1', repo: 'AL-Go', label: 'known-issue' },
            { owner: 'microsoft', repo: 'navcontainerhelper', label: 'Accepted' },
        ];

        async function fetchIssues() {
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const issueList = document.getElementById('issue-list');
            const banner = document.getElementById('status-banner');

            try {
                const allIssues = [];
                for (const source of SOURCES) {
                    const response = await fetch(
                        `https://api.github.com/repos/${source.owner}/${source.repo}/issues?labels=${source.label}&state=open&sort=created&direction=desc&per_page=50`
                    );
                    if (!response.ok) {
                        console.warn(`Failed to fetch from ${source.owner}/${source.repo}: ${response.status}`);
                        continue;
                    }
                    const issues = await response.json();
                    issues.forEach(issue => {
                        issue._source = source;
                    });
                    allIssues.push(...issues);
                }

                // Sort all issues by created date descending
                allIssues.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                loading.style.display = 'none';

                // Status banner
                banner.style.display = 'flex';
                if (allIssues.length === 0) {
                    banner.className = 'status-banner all-clear';
                    banner.innerHTML = '✅ All systems operational — no known issues';
                } else {
                    banner.className = 'status-banner has-issues';
                    banner.innerHTML = `⚠️ ${allIssues.length} known issue${allIssues.length > 1 ? 's' : ''} currently tracked`;
                }

                // Render issues
                allIssues.forEach(issue => {
                    const card = document.createElement('div');
                    card.className = 'issue-card';

                    const created = new Date(issue.created_at);
                    const timeAgo = getTimeAgo(created);

                    const repoLabel = `<span class="label" style="background:#0969da;color:#fff">${issue._source.owner}/${issue._source.repo}</span>`;

                    const labelsHtml = issue.labels
                        .filter(l => l.name !== issue._source.label)
                        .map(l => `<span class="label" style="background:#${l.color};color:${getContrastColor(l.color)}">${l.name}</span>`)
                        .join('');

                    const bodyPreview = issue.body
                        ? issue.body.substring(0, 300).replace(/[#*_`\[\]]/g, '')
                        : '<em>No description provided</em>';

                    card.innerHTML = `
                        <h3><a href="${issue.html_url}" target="_blank">#${issue.number} — ${issue.title}</a></h3>
                        <div class="issue-meta">Opened ${timeAgo} by ${issue.user.login}</div>
                        <div class="issue-body">${bodyPreview}</div>
                        <div class="labels">${repoLabel} ${labelsHtml}</div>
                    `;

                    issueList.appendChild(card);
                });

            } catch (err) {
                loading.style.display = 'none';
                errorDiv.style.display = 'block';
                errorDiv.textContent = `Failed to load issues: ${err.message}`;
            }
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            const intervals = [
                { label: 'year', seconds: 31536000 },
                { label: 'month', seconds: 2592000 },
                { label: 'week', seconds: 604800 },
                { label: 'day', seconds: 86400 },
                { label: 'hour', seconds: 3600 },
                { label: 'minute', seconds: 60 },
            ];
            for (const interval of intervals) {
                const count = Math.floor(seconds / interval.seconds);
                if (count >= 1) return `${count} ${interval.label}${count > 1 ? 's' : ''} ago`;
            }
            return 'just now';
        }

        function getContrastColor(hex) {
            const r = parseInt(hex.substr(0, 2), 16);
            const g = parseInt(hex.substr(2, 2), 16);
            const b = parseInt(hex.substr(4, 2), 16);
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return luminance > 0.5 ? '#1f2328' : '#ffffff';
        }

        fetchIssues();
    </script>
</body>
</html>
