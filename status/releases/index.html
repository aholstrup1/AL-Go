<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-Go Releases</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --card-bg: #f6f8fa;
            --card-border: #d0d7de;
            --text: #1f2328;
            --text-secondary: #656d76;
            --accent: #0969da;
            --green: #1a7f37;
            --purple: #8250df;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

        nav {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            padding: 1rem 0;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--card-border);
            font-size: 0.95rem;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.25rem 0;
            border-bottom: 2px solid transparent;
        }

        nav a:hover { color: var(--accent); }
        nav a.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

        header { text-align: center; margin-bottom: 2rem; }
        header h1 { font-size: 2rem; font-weight: 600; margin-bottom: 0.5rem; }
        header p { color: var(--text-secondary); font-size: 1.1rem; }

        .latest-release {
            background: var(--card-bg);
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
        }

        .version-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .version-tag {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }

        .version-meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-align: right;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        .badge.latest { background: var(--green); }
        .badge.prerelease { background: var(--purple); }

        .release-notes {
            border-top: 1px solid var(--card-border);
            padding-top: 1rem;
            font-size: 0.95rem;
        }

        .release-notes h1 { font-size: 1.4rem; margin: 1.2rem 0 0.6rem; }
        .release-notes h2 { font-size: 1.2rem; margin: 1rem 0 0.5rem; }
        .release-notes h3 { font-size: 1.05rem; margin: 0.8rem 0 0.4rem; }
        .release-notes ul { padding-left: 1.5rem; margin: 0.5rem 0; }
        .release-notes li { margin-bottom: 0.3rem; }
        .release-notes code { background: #eff1f3; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        .release-notes pre { background: #0d1117; color: #e6edf3; padding: 1rem; border-radius: 6px; overflow-x: auto; margin: 0.5rem 0; }
        .release-notes pre code { background: none; color: inherit; padding: 0; }
        .release-notes a { color: var(--accent); }

        .gh-link {
            display: inline-block;
            margin-top: 1rem;
            padding: 6px 16px;
            background: var(--accent);
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .gh-link:hover { opacity: 0.9; }

        .release-history { margin-top: 2rem; }
        .release-history h2 { font-size: 1.3rem; margin-bottom: 1rem; }

        .release-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            border: 1px solid var(--card-border);
            border-radius: 6px;
            margin-bottom: 0.5rem;
            background: var(--card-bg);
        }

        .release-item:hover { border-color: var(--accent); }
        .release-item a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .release-item a:hover { text-decoration: underline; }
        .release-item .date { color: var(--text-secondary); font-size: 0.85rem; }

        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); font-size: 1.1rem; }
        .error-msg { text-align: center; padding: 2rem; color: #cf222e; background: #ffebe9; border: 1px solid #ffcecb; border-radius: 8px; }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--card-border);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="../">🔔 Known Issues</a>
            <a href="./" class="active">📦 Releases</a>
        </nav>

        <header>
            <h1>📦 AL-Go for GitHub — Releases</h1>
            <p>Latest version and release history</p>
        </header>

        <div id="loading" class="loading">Loading releases...</div>
        <div id="error" class="error-msg" style="display:none;"></div>
        <div id="latest" style="display:none;"></div>
        <div id="history" class="release-history" style="display:none;"></div>

        <footer>
            <p>
                Powered by <a href="https://github.com/microsoft/AL-Go">AL-Go for GitHub</a> ·
                <a href="https://github.com/microsoft/AL-Go/releases">All releases on GitHub</a>
            </p>
        </footer>
    </div>

    <script>
        const REPO_OWNER = 'microsoft';
        const REPO_NAME = 'AL-Go';

        async function fetchReleases() {
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const latestDiv = document.getElementById('latest');
            const historyDiv = document.getElementById('history');

            try {
                const response = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/releases?per_page=10`
                );

                if (!response.ok) throw new Error(`GitHub API returned ${response.status}`);

                const releases = await response.json();
                loading.style.display = 'none';

                if (releases.length === 0) {
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = 'No releases found.';
                    return;
                }

                // Latest release
                const latest = releases[0];
                latestDiv.style.display = 'block';

                const publishedDate = new Date(latest.published_at).toLocaleDateString('en-US', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });

                const badge = latest.prerelease
                    ? '<span class="badge prerelease">Pre-release</span>'
                    : '<span class="badge latest">Latest</span>';

                const notesHtml = latest.body ? marked.parse(latest.body) : '<em>No release notes provided.</em>';

                latestDiv.innerHTML = `
                    <div class="latest-release">
                        <div class="version-header">
                            <div>
                                <span class="version-tag">${latest.tag_name}</span>
                                ${badge}
                            </div>
                            <div class="version-meta">
                                <div>Published ${publishedDate}</div>
                                <div>by ${latest.author.login}</div>
                            </div>
                        </div>
                        <div class="release-notes">${notesHtml}</div>
                        <a class="gh-link" href="${latest.html_url}" target="_blank">View on GitHub →</a>
                    </div>
                `;

                // Release history
                if (releases.length > 1) {
                    historyDiv.style.display = 'block';
                    let historyHtml = '<h2>Previous Releases</h2>';
                    releases.slice(1).forEach(rel => {
                        const date = new Date(rel.published_at).toLocaleDateString('en-US', {
                            year: 'numeric', month: 'short', day: 'numeric'
                        });
                        const preBadge = rel.prerelease ? ' <span class="badge prerelease">Pre-release</span>' : '';
                        historyHtml += `
                            <div class="release-item">
                                <div>
                                    <a href="${rel.html_url}" target="_blank">${rel.tag_name}</a>
                                    ${preBadge}
                                    <span style="color:var(--text-secondary);font-weight:400;margin-left:0.5rem;">${rel.name || ''}</span>
                                </div>
                                <span class="date">${date}</span>
                            </div>
                        `;
                    });
                    historyDiv.innerHTML = historyHtml;
                }

            } catch (err) {
                loading.style.display = 'none';
                errorDiv.style.display = 'block';
                errorDiv.textContent = `Failed to load releases: ${err.message}`;
            }
        }

        fetchReleases();
    </script>
</body>
</html>
